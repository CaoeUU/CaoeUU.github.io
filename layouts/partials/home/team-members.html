{{/* 队员展示 - 沿用 contributor 小头像样式，8 个位 */}}
{{ with site.Data.team }}
<section class="contributors-section mt-12 mb-10">
  <div class="flex flex-col items-center mb-6">
    <div class="flex items-center gap-2 mb-2">
      <span class="text-2xl text-primary-500">
        {{ partial "icon.html" "heart" }}
      </span>
      <h2 class="text-2xl font-extrabold text-neutral-800 dark:text-neutral-200">
        队员展示
      </h2>
    </div>
    <p class="text-neutral-600 dark:text-neutral-400 text-center">
      我们的跳绳队成员
    </p>
  </div>

  <div class="flex flex-wrap justify-center gap-3">
    {{ range . }}
      {{ $avatar := default (printf "https://ui-avatars.com/api/?name=%s&size=128&background=e8e4d9&color=8a8478" (urlquery .name)) .avatar_url }}
      <a
        href="{{ .profile_url | default "#" }}"
        {{ if and .profile_url (ne .profile_url "#") }}target="_blank" rel="noopener noreferrer"{{ end }}
        class="group"
        title="{{ .name }}"
        aria-label="队员: {{ .name }}">
        <img
          class="nozoom h-10 w-10 rounded-full transition-all group-hover:scale-110 group-hover:ring-2 group-hover:ring-primary-500 object-cover"
          src="{{ $avatar }}"
          alt="{{ .name }}"
          width="40"
          height="40"
          loading="lazy">
      </a>
    {{ end }}
  </div>
</section>
{{ end }}
