{{/* 8 个队员小头像，样式与 contributors 完全一致，无链接；悬停边框用 custom.css 确保远程生效 */}}
{{ with site.Data.team_avatars }}
<div class="flex flex-wrap justify-center gap-3 mt-3 mb-2 team-avatar-row">
  {{ range . }}
    <span class="group team-avatar-item" title="{{ .name | default "队员" }}">
      <img
        class="nozoom h-10 w-10 rounded-full transition-all object-cover team-avatar-img"
        src="{{ .image }}"
        alt="{{ .name | default "队员" }}"
        width="40"
        height="40"
        loading="lazy"
        onerror="this.src='https://ui-avatars.com/api/?name={{ urlquery ( .name | default "?" ) }}&size=80&background=e8e4d9&color=8a8478'">
    </span>
  {{ end }}
</div>
{{ end }}
