<div class="mt-4 pt-4 border-t border-neutral-200 dark:border-neutral-700">
  <p class="text-sm text-neutral-500 dark:text-neutral-400">
    {{ i18n "footer.visits" }}: <span id="busuanzi_site_pv">0</span>
